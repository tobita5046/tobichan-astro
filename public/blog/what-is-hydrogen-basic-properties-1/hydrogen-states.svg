<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 18 1000 560" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect x="0" y="18" width="1000" height="560" fill="#f8fafc"/>

  <!-- ヘッダー -->
  <text x="500" y="42" text-anchor="middle" font-size="24" font-weight="bold" fill="#1e293b">水素の4つの状態 ── 温度で姿を変える</text>
  <text x="500" y="68" text-anchor="middle" font-size="13" fill="#64748b">プラズマ ／ 気体 ／ 液体 ／ 固体</text>

  <!-- 温度スケール軸 -->
  <line x1="180" y1="120" x2="180" y2="520" stroke="#475569" stroke-width="3"/>

  <!-- 温度目盛 -->
  <g font-size="12" fill="#475569">
    <!-- 1万℃ -->
    <line x1="170" y1="140" x2="190" y2="140" stroke="#475569" stroke-width="2"/>
    <text x="155" y="145" text-anchor="end" font-weight="bold">約 10,000℃</text>

    <line x1="170" y1="240" x2="190" y2="240" stroke="#475569" stroke-width="2"/>
    <text x="155" y="245" text-anchor="end">0℃（参考）</text>

    <line x1="170" y1="380" x2="190" y2="380" stroke="#475569" stroke-width="2"/>
    <text x="155" y="385" text-anchor="end" font-weight="bold">-253℃</text>

    <line x1="170" y1="420" x2="190" y2="420" stroke="#475569" stroke-width="2"/>
    <text x="155" y="425" text-anchor="end" font-weight="bold">-259℃</text>

    <line x1="170" y1="490" x2="190" y2="490" stroke="#475569" stroke-width="2"/>
    <text x="155" y="495" text-anchor="end" font-weight="bold">-273℃（絶対零度）</text>
  </g>

  <!-- ====== プラズマゾーン ====== -->
  <rect x="220" y="100" width="700" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="240" y="135" font-size="20" font-weight="bold" fill="#92400e">⚡ プラズマ</text>
  <text x="240" y="160" font-size="12" fill="#92400e">陽子と電子のペアが分かれて飛び回る状態。核融合で出てくる重要な状態。</text>

  <!-- ====== ガスゾーン ====== -->
  <rect x="220" y="200" width="700" height="160" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="240" y="232" font-size="20" font-weight="bold" fill="#1e40af">💨 気体（ガス）</text>
  <text x="240" y="257" font-size="12" fill="#1e40af">水素ボンベの中身はこの状態。普段見る水素はぜんぶこれ。</text>
  <text x="240" y="280" font-size="11" fill="#475569">密度：約 0.08988 g/L（空気の約 14 倍軽い！）</text>
  <text x="240" y="300" font-size="11" fill="#475569">マイナス 253℃ 〜 1万℃ までの広い温度範囲で気体</text>

  <!-- 簡易分子イメージ（H₂） -->
  <g transform="translate(820, 285)">
    <text x="0" y="-30" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="bold">水素分子 H₂</text>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#475569" stroke-width="2"/>
    <circle cx="-18" cy="0" r="14" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5"/>
    <text x="-18" y="4" text-anchor="middle" font-size="12" font-weight="bold" fill="white">H</text>
    <circle cx="18" cy="0" r="14" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5"/>
    <text x="18" y="4" text-anchor="middle" font-size="12" font-weight="bold" fill="white">H</text>
  </g>

  <!-- ====== 液体ゾーン（たった6度） ====== -->
  <rect x="220" y="370" width="700" height="40" rx="8" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
  <text x="240" y="397" font-size="16" font-weight="bold" fill="#075985">💧 液体（たった 6℃ の幅）</text>
  <text x="650" y="397" font-size="11" fill="#075985">密度：約 70.8 g/L（ガスの 800 倍）</text>

  <!-- ====== 固体ゾーン ====== -->
  <rect x="220" y="430" width="700" height="80" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="240" y="462" font-size="18" font-weight="bold" fill="#3730a3">🧊 固体</text>
  <text x="240" y="487" font-size="12" fill="#3730a3">水素分子が積み重なってカチコチに。-273℃の絶対零度まで存在する氷の世界。</text>

  <!-- 下部の注釈 -->
  <g transform="translate(80, 540)">
    <text x="0" y="0" font-size="11" fill="#64748b">💡 水素・ヘリウムは地球上で「最も液化しにくいガス」（窒素は -196℃ で液体）</text>
    <text x="840" y="20" text-anchor="end" font-size="10" fill="#94a3b8">水素のお兄さん とびchan.</text>
  </g>
</svg>
