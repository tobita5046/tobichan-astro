<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <!-- 背景 -->
  <rect width="1000" height="560" fill="#f8fafc"/>

  <!-- ====== ヘッダーエリア（y: 0-90） ====== -->
  <text x="500" y="42" text-anchor="middle" font-size="24" font-weight="bold" fill="#1e293b">
    水素の3つの同位体
  </text>
  <text x="500" y="68" text-anchor="middle" font-size="13" fill="#64748b">
    Light Hydrogen / Deuterium / Tritium
  </text>

  <!-- ====== 図エリア（y: 100-310） ====== -->
  <!-- 軽水素 -->
  <g transform="translate(200, 200)">
    <circle cx="0" cy="0" r="90" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="5,4"/>
    <circle cx="0" cy="0" r="22" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
    <text x="0" y="6" text-anchor="middle" font-size="16" font-weight="bold" fill="white">P</text>
    <circle cx="90" cy="0" r="9" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
  </g>

  <!-- 重水素 -->
  <g transform="translate(500, 200)">
    <circle cx="0" cy="0" r="90" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="5,4"/>
    <circle cx="-13" cy="0" r="18" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
    <text x="-13" y="5" text-anchor="middle" font-size="13" font-weight="bold" fill="white">P</text>
    <circle cx="13" cy="0" r="18" fill="#9ca3af" stroke="#4b5563" stroke-width="2"/>
    <text x="13" y="5" text-anchor="middle" font-size="13" font-weight="bold" fill="white">N</text>
    <circle cx="90" cy="0" r="9" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
  </g>

  <!-- 三重水素 -->
  <g transform="translate(800, 200)">
    <circle cx="0" cy="0" r="90" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="5,4"/>
    <circle cx="0" cy="-15" r="16" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
    <text x="0" y="-11" text-anchor="middle" font-size="12" font-weight="bold" fill="white">P</text>
    <circle cx="-14" cy="9" r="16" fill="#9ca3af" stroke="#4b5563" stroke-width="2"/>
    <text x="-14" y="13" text-anchor="middle" font-size="12" font-weight="bold" fill="white">N</text>
    <circle cx="14" cy="9" r="16" fill="#9ca3af" stroke="#4b5563" stroke-width="2"/>
    <text x="14" y="13" text-anchor="middle" font-size="12" font-weight="bold" fill="white">N</text>
    <circle cx="90" cy="0" r="9" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
  </g>

  <!-- ====== ラベルエリア（y: 340-490） ====== -->
  <!-- 軽水素ラベル -->
  <g transform="translate(200, 340)">
    <rect x="-130" y="0" width="260" height="160" rx="8" fill="white" stroke="#dcfce7" stroke-width="2"/>
    <text x="0" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">軽水素</text>
    <text x="0" y="48" text-anchor="middle" font-size="11" fill="#64748b">Protium / ¹H</text>
    <line x1="-100" y1="62" x2="100" y2="62" stroke="#e2e8f0" stroke-width="1"/>
    <text x="0" y="82" text-anchor="middle" font-size="12" fill="#475569">陽子 1個 + 電子 1個</text>
    <text x="0" y="105" text-anchor="middle" font-size="13" fill="#1e293b" font-weight="600">原子量 約 1.008</text>
    <text x="0" y="135" text-anchor="middle" font-size="13" fill="#16a34a" font-weight="bold">存在比 99.985%</text>
  </g>

  <!-- 重水素ラベル -->
  <g transform="translate(500, 340)">
    <rect x="-130" y="0" width="260" height="160" rx="8" fill="white" stroke="#fef3c7" stroke-width="2"/>
    <text x="0" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">重水素</text>
    <text x="0" y="48" text-anchor="middle" font-size="11" fill="#64748b">Deuterium / ²H (D)</text>
    <line x1="-100" y1="62" x2="100" y2="62" stroke="#e2e8f0" stroke-width="1"/>
    <text x="0" y="82" text-anchor="middle" font-size="12" fill="#475569">陽子 1 + 中性子 1 + 電子 1</text>
    <text x="0" y="105" text-anchor="middle" font-size="13" fill="#1e293b" font-weight="600">原子量 約 2.014</text>
    <text x="0" y="135" text-anchor="middle" font-size="13" fill="#f59e0b" font-weight="bold">存在比 0.015%</text>
  </g>

  <!-- 三重水素ラベル -->
  <g transform="translate(800, 340)">
    <rect x="-130" y="0" width="260" height="160" rx="8" fill="white" stroke="#fee2e2" stroke-width="2"/>
    <text x="0" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">三重水素</text>
    <text x="0" y="48" text-anchor="middle" font-size="11" fill="#64748b">Tritium / ³H (T)</text>
    <line x1="-100" y1="62" x2="100" y2="62" stroke="#e2e8f0" stroke-width="1"/>
    <text x="0" y="82" text-anchor="middle" font-size="12" fill="#475569">陽子 1 + 中性子 2 + 電子 1</text>
    <text x="0" y="105" text-anchor="middle" font-size="13" fill="#1e293b" font-weight="600">原子量 約 3.016</text>
    <text x="0" y="135" text-anchor="middle" font-size="13" fill="#dc2626" font-weight="bold">ごく微量・不安定</text>
  </g>

  <!-- ====== 凡例エリア（y: 510-555） ====== -->
  <g transform="translate(80, 525)">
    <circle cx="0" cy="0" r="8" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5"/>
    <text x="16" y="4" font-size="12" fill="#475569">P = 陽子 (Proton)</text>

    <circle cx="220" cy="0" r="8" fill="#9ca3af" stroke="#4b5563" stroke-width="1.5"/>
    <text x="236" y="4" font-size="12" fill="#475569">N = 中性子 (Neutron)</text>

    <circle cx="460" cy="0" r="7" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
    <text x="476" y="4" font-size="12" fill="#475569">青い小球 = 電子 (Electron)</text>
  </g>
  <text x="940" y="548" text-anchor="end" font-size="10" fill="#94a3b8">水素のお兄さん とびchan.</text>
</svg>
