<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <!-- 背景 -->
  <rect width="1000" height="480" fill="#f8fafc"/>

  <!-- ====== ヘッダー（y: 0-90） ====== -->
  <text x="500" y="42" text-anchor="middle" font-size="24" font-weight="bold" fill="#1e293b">
    水素発見と命名の歴史
  </text>
  <text x="500" y="68" text-anchor="middle" font-size="13" fill="#64748b">
    Discovery and Naming of Hydrogen
  </text>

  <!-- ====== カードエリア（y: 110-280） ====== -->
  <!-- カード1：1671 ボイル -->
  <g transform="translate(180, 195)">
    <rect x="-130" y="-90" width="260" height="180" rx="10" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
    <text x="0" y="-58" text-anchor="middle" font-size="22" font-weight="bold" fill="#92400e">1671年</text>
    <line x1="-100" y1="-42" x2="100" y2="-42" stroke="#fde68a" stroke-width="1.5"/>
    <text x="0" y="-20" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">ロバート・ボイル</text>
    <text x="0" y="0" text-anchor="middle" font-size="11" fill="#64748b">Robert Boyle</text>
    <text x="0" y="28" text-anchor="middle" font-size="12" fill="#475569">鉄に希硫酸をかけ</text>
    <text x="0" y="48" text-anchor="middle" font-size="12" fill="#475569">「燃える気体」を観察</text>
    <text x="0" y="76" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">先行研究</text>
  </g>

  <!-- カード2：1766 キャベンディッシュ -->
  <g transform="translate(500, 195)">
    <rect x="-140" y="-90" width="280" height="180" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="0" y="-58" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e40af">1766年</text>
    <line x1="-110" y1="-42" x2="110" y2="-42" stroke="#bfdbfe" stroke-width="1.5"/>
    <text x="0" y="-20" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">ヘンリー・キャベンディッシュ</text>
    <text x="0" y="0" text-anchor="middle" font-size="11" fill="#64748b">Henry Cavendish</text>
    <text x="0" y="28" text-anchor="middle" font-size="12" fill="#475569">「燃える空気」として</text>
    <text x="0" y="48" text-anchor="middle" font-size="12" fill="#475569">体系的に単離・性質を発表</text>
    <text x="0" y="76" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">水素の発見</text>
  </g>

  <!-- カード3：1789 ラヴォアジェ -->
  <g transform="translate(820, 195)">
    <rect x="-130" y="-90" width="260" height="180" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="0" y="-58" text-anchor="middle" font-size="22" font-weight="bold" fill="#166534">1789年</text>
    <line x1="-100" y1="-42" x2="100" y2="-42" stroke="#bbf7d0" stroke-width="1.5"/>
    <text x="0" y="-20" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">ラヴォアジェ</text>
    <text x="0" y="0" text-anchor="middle" font-size="11" fill="#64748b">Antoine Lavoisier</text>
    <text x="0" y="28" text-anchor="middle" font-size="12" fill="#475569">「水を作るもの」として</text>
    <text x="0" y="48" text-anchor="middle" font-size="12" fill="#475569">「ハイドロジェン」と命名</text>
    <text x="0" y="76" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">水素の命名</text>
  </g>

  <!-- ====== タイムライン軸（y: 320-360） ====== -->
  <line x1="100" y1="340" x2="900" y2="340" stroke="#cbd5e1" stroke-width="3"/>
  <!-- ノード1 -->
  <g transform="translate(180, 340)">
    <circle cx="0" cy="0" r="14" fill="#fbbf24" stroke="#d97706" stroke-width="2.5"/>
    <text x="0" y="5" text-anchor="middle" font-size="11" font-weight="bold" fill="white">1</text>
  </g>
  <!-- ノード2 -->
  <g transform="translate(500, 340)">
    <circle cx="0" cy="0" r="16" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2.5"/>
    <text x="0" y="5" text-anchor="middle" font-size="11" font-weight="bold" fill="white">2</text>
  </g>
  <!-- ノード3 -->
  <g transform="translate(820, 340)">
    <circle cx="0" cy="0" r="14" fill="#22c55e" stroke="#15803d" stroke-width="2.5"/>
    <text x="0" y="5" text-anchor="middle" font-size="11" font-weight="bold" fill="white">3</text>
  </g>

  <!-- ====== 下部の注釈（y: 395-455） ====== -->
  <g transform="translate(80, 395)">
    <rect x="0" y="0" width="840" height="60" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="420" y="25" text-anchor="middle" font-size="13" fill="#475569" font-weight="600">
      💡 「ハイドロ（hydro-）」はギリシャ語の HYDOR（水）が語源
    </text>
    <text x="420" y="46" text-anchor="middle" font-size="12" fill="#64748b">
      「水を生み出すもの」を意味する hydrogen と命名された
    </text>
  </g>

  <text x="940" y="472" text-anchor="end" font-size="10" fill="#94a3b8">水素のお兄さん とびchan.</text>
</svg>
