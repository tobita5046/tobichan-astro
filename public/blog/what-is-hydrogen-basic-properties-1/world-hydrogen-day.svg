<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <!-- 背景 -->
  <rect width="1100" height="500" fill="#f8fafc"/>

  <!-- ====== ヘッダー（y: 0-90） ====== -->
  <text x="550" y="42" text-anchor="middle" font-size="24" font-weight="bold" fill="#1e293b">
    水素の原子量 1.008 と「世界水素の日」
  </text>
  <text x="550" y="68" text-anchor="middle" font-size="13" fill="#64748b">
    World Hydrogen Day — October 8th
  </text>

  <!-- 矢印マーカー定義 -->
  <defs>
    <marker id="arrowDay" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- ====== ボックス1：原子量（中心 x=170） ====== -->
  <!-- 配置範囲：x=50〜290 -->
  <g transform="translate(170, 240)">
    <rect x="-120" y="-100" width="240" height="200" rx="14" fill="white" stroke="#3b82f6" stroke-width="2.5"/>
    <text x="0" y="-68" text-anchor="middle" font-size="13" fill="#475569" font-weight="600">水素の平均原子量</text>
    <line x1="-90" y1="-50" x2="90" y2="-50" stroke="#dbeafe" stroke-width="1.5"/>
    <text x="0" y="22" text-anchor="middle" font-size="56" font-weight="bold" fill="#1e40af">1.008</text>
    <text x="0" y="58" text-anchor="middle" font-size="11" fill="#64748b">amu (原子質量単位)</text>
    <text x="0" y="80" text-anchor="middle" font-size="11" fill="#64748b">Atomic Mass Unit</text>
  </g>

  <!-- ====== 矢印1（中心 x=360、ボックス1とボックス2の間） ====== -->
  <!-- 配置範囲：x=310〜410（線）／ボックス1とは20px、ボックス2とは30px空ける -->
  <g transform="translate(360, 240)">
    <text x="0" y="-22" text-anchor="middle" font-size="11" fill="#64748b">小数点を移動</text>
    <line x1="-50" y1="0" x2="50" y2="0" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrowDay)"/>
  </g>

  <!-- ====== ボックス2：10.08（中心 x=550） ====== -->
  <!-- 配置範囲：x=440〜660 -->
  <g transform="translate(550, 240)">
    <rect x="-110" y="-100" width="220" height="200" rx="14" fill="white" stroke="#fbbf24" stroke-width="2.5"/>
    <text x="0" y="-68" text-anchor="middle" font-size="13" fill="#475569" font-weight="600">読み替えると</text>
    <line x1="-80" y1="-50" x2="80" y2="-50" stroke="#fef3c7" stroke-width="1.5"/>
    <text x="0" y="22" text-anchor="middle" font-size="50" font-weight="bold" fill="#a16207">10.08</text>
    <text x="0" y="58" text-anchor="middle" font-size="13" fill="#64748b">10 . 08</text>
    <text x="0" y="80" text-anchor="middle" font-size="11" fill="#64748b">月 . 日</text>
  </g>

  <!-- ====== 矢印2（中心 x=730） ====== -->
  <!-- 配置範囲：x=680〜780（線）／ボックス2とは20px、ボックス3とは30px空ける -->
  <g transform="translate(730, 240)">
    <text x="0" y="-22" text-anchor="middle" font-size="11" fill="#64748b">日付として読む</text>
    <line x1="-50" y1="0" x2="50" y2="0" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrowDay)"/>
  </g>

  <!-- ====== ボックス3：カレンダー（中心 x=900） ====== -->
  <!-- 配置範囲：x=810〜990 -->
  <g transform="translate(900, 240)">
    <rect x="-90" y="-100" width="180" height="200" rx="12" fill="white" stroke="#dc2626" stroke-width="3"/>
    <!-- 上部赤帯 -->
    <rect x="-90" y="-100" width="180" height="44" rx="12" fill="#dc2626"/>
    <rect x="-90" y="-65" width="180" height="9" fill="#dc2626"/>
    <text x="0" y="-72" text-anchor="middle" font-size="18" font-weight="bold" fill="white">OCTOBER</text>
    <!-- 日付 -->
    <text x="0" y="32" text-anchor="middle" font-size="68" font-weight="bold" fill="#dc2626">8</text>
    <text x="0" y="65" text-anchor="middle" font-size="11" fill="#64748b" font-weight="600">World Hydrogen Day</text>
    <text x="0" y="84" text-anchor="middle" font-size="11" fill="#64748b">世界水素の日</text>
  </g>

  <!-- ====== 下部注釈（y: 400-460） ====== -->
  <g transform="translate(170, 405)">
    <rect x="0" y="0" width="760" height="60" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="380" y="25" text-anchor="middle" font-size="13" fill="#92400e" font-weight="600">
      🎉 毎年10月8日、世界中の水素関連団体がカンファレンスやイベントを開催
    </text>
    <text x="380" y="46" text-anchor="middle" font-size="12" fill="#92400e">
      水素好きを名乗るなら、覚えておきたい記念日
    </text>
  </g>

  <text x="1040" y="490" text-anchor="end" font-size="10" fill="#94a3b8">水素のお兄さん とびchan.</text>
</svg>
