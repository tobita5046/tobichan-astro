<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <!-- グラデーション定義 -->
  <defs>
    <radialGradient id="electronCloud" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#60a5fa" stop-opacity="0.5"/>
      <stop offset="75%" stop-color="#93c5fd" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#dbeafe" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1000" height="580" fill="#f8fafc"/>

  <!-- ====== ヘッダー（y: 0-90） ====== -->
  <text x="500" y="42" text-anchor="middle" font-size="24" font-weight="bold" fill="#1e293b">
    ボーア模型 vs 雲モデル
  </text>
  <text x="500" y="68" text-anchor="middle" font-size="13" fill="#64748b">
    電子はどこにある？ 簡略表現と実態に近い表現
  </text>

  <!-- ====== タイトル帯（y: 110-150） ====== -->
  <rect x="80" y="110" width="320" height="40" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
  <text x="240" y="135" text-anchor="middle" font-size="15" font-weight="bold" fill="#92400e">ボーア模型（簡略表現）</text>

  <rect x="600" y="110" width="320" height="40" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="760" y="135" text-anchor="middle" font-size="15" font-weight="bold" fill="#166534">雲モデル（実態に近い）</text>

  <!-- ====== 図エリア（y: 180-410） ====== -->
  <!-- 左：ボーア模型 -->
  <g transform="translate(240, 295)">
    <circle cx="0" cy="0" r="100" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="5,4"/>
    <circle cx="0" cy="0" r="26" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" font-size="18" font-weight="bold" fill="white">P</text>
    <circle cx="100" cy="0" r="11" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
  </g>

  <!-- 中央：矢印 -->
  <g transform="translate(500, 295)">
    <line x1="-50" y1="0" x2="50" y2="0" stroke="#475569" stroke-width="3" marker-end="url(#arrowGray)"/>
    <text x="0" y="-22" text-anchor="middle" font-size="14" font-weight="bold" fill="#475569">実は</text>
    <text x="0" y="32" text-anchor="middle" font-size="11" fill="#64748b">こちらが近い</text>
  </g>
  <defs>
    <marker id="arrowGray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- 右：雲モデル -->
  <g transform="translate(760, 295)">
    <circle cx="0" cy="0" r="115" fill="url(#electronCloud)"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#1e40af" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.6"/>
    <circle cx="0" cy="0" r="18" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
    <text x="0" y="6" text-anchor="middle" font-size="14" font-weight="bold" fill="white">P</text>
  </g>

  <!-- ====== 説明テキストエリア（y: 440-510） ====== -->
  <!-- 左の説明 -->
  <g transform="translate(80, 440)">
    <rect x="0" y="0" width="320" height="80" rx="8" fill="white" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="160" y="28" text-anchor="middle" font-size="12" fill="#475569">電子が決まった軌道を</text>
    <text x="160" y="46" text-anchor="middle" font-size="12" fill="#475569">「ぐるぐる回っている」イメージ</text>
    <text x="160" y="68" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="bold">⚠ 直感的だが厳密には誤り</text>
  </g>

  <!-- 右の説明 -->
  <g transform="translate(600, 440)">
    <rect x="0" y="0" width="320" height="80" rx="8" fill="white" stroke="#22c55e" stroke-width="1.5"/>
    <text x="160" y="28" text-anchor="middle" font-size="12" fill="#475569">電子は雲のように球対称に広がり</text>
    <text x="160" y="46" text-anchor="middle" font-size="12" fill="#475569">「90%の確率でこの範囲にいる」</text>
    <text x="160" y="68" text-anchor="middle" font-size="11" fill="#16a34a" font-weight="bold">✓ 量子力学的にはこちらが正確</text>
  </g>

  <!-- ====== 下部注釈（y: 540-575） ====== -->
  <g transform="translate(80, 540)">
    <rect x="0" y="0" width="840" height="32" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="420" y="21" text-anchor="middle" font-size="12" fill="#475569">
      💡 ボーア模型は理解しやすい簡略表現として今も使われています
    </text>
  </g>

  <text x="940" y="572" text-anchor="end" font-size="10" fill="#94a3b8">水素のお兄さん とびchan.</text>
</svg>
