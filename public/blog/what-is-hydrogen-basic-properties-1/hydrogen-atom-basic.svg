<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 600" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <!-- 背景 -->
  <rect width="700" height="600" fill="#f8fafc"/>

  <!-- ====== ヘッダーエリア（y: 0-90） ====== -->
  <text x="350" y="42" text-anchor="middle" font-size="24" font-weight="bold" fill="#1e293b">
    水素原子の基本構造
  </text>
  <text x="350" y="68" text-anchor="middle" font-size="13" fill="#64748b">
    Hydrogen Atom (¹H) — 元素番号 1
  </text>

  <!-- ====== 図エリア（y: 110-410） ====== -->
  <g transform="translate(350, 260)">
    <!-- 電子軌道（点線） -->
    <circle cx="0" cy="0" r="130" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6,5"/>

    <!-- 原子核：陽子1個 -->
    <circle cx="0" cy="0" r="32" fill="#ef4444" stroke="#b91c1c" stroke-width="2.5"/>
    <text x="0" y="8" text-anchor="middle" font-size="22" font-weight="bold" fill="white">P</text>

    <!-- 電子1個 -->
    <circle cx="130" cy="0" r="13" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
  </g>

  <!-- ====== 凡例エリア（y: 440-490） ====== -->
  <g transform="translate(120, 460)">
    <circle cx="0" cy="0" r="12" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" font-weight="bold" fill="white">P</text>
    <text x="22" y="5" font-size="13" fill="#1e293b" font-weight="600">原子核（陽子 1個）</text>

    <circle cx="290" cy="0" r="9" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
    <text x="305" y="5" font-size="13" fill="#1e293b" font-weight="600">電子（1個）</text>
  </g>

  <!-- ====== 注釈ボックス（y: 520-580） ====== -->
  <g transform="translate(60, 520)">
    <rect x="0" y="0" width="580" height="60" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="290" y="25" text-anchor="middle" font-size="12" fill="#92400e" font-weight="600">
      💡 これは「ボーア模型」という簡略表現
    </text>
    <text x="290" y="45" text-anchor="middle" font-size="11" fill="#92400e">
      実際の電子は雲のように球対称に広がっています
    </text>
  </g>

  <text x="660" y="595" text-anchor="end" font-size="10" fill="#94a3b8">水素のお兄さん とびchan.</text>
</svg>
